<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | HUM Journal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F8F9FA;
            padding: 2rem;
        }
        .login-box {
            background: white;
            padding: 3rem;
            border: 1px solid #E5E5E5;
            max-width: 400px;
            width: 100%;
        }
        .login-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #0A2342;
        }
        .login-subtitle {
            color: #4A5568;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #111;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #E5E5E5;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: #0A2342;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-primary {
            background: #0A2342;
            color: white;
        }
        .btn-primary:hover {
            background: #1E3A5F;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-msg {
            color: #DC2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            padding: 0.75rem;
            background: #FEE2E2;
            border: 1px solid #FECACA;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #4A5568;
            text-decoration: none;
        }
        .back-link:hover {
            color: #0A2342;
        }
    </style>
</head>
<body>
    <div class="login-container" id="admin-login">
        <div class="login-box">
            <h1 class="login-title">HUM Journal</h1>
            <p class="login-subtitle">Admin Login / 绠＄悊鍛樼櫥褰?/p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password / 瀵嗙爜</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <div class="error-msg" id="loginError"></div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Login / 鐧诲綍</button>
            </form>

            <a href="index.html" class="back-link">鈫?Back to Home / 杩斿洖棣栭〉</a>
        </div>
    </div>

    <script>
        // Supabase config
        const SUPABASE_URL = 'https://gslggufgrtmdeyyyveay.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_9aToFofHZaM9crNMcCpaAQ_xGpm2MBJ';
        const HASH_SALT = 'hum_salt_v1';

        // Rate limiting
        const MAX_LOGIN_ATTEMPTS = 5;
        const LOCKOUT_DURATION = 15 * 60 * 1000;

        function getLoginAttempts() {
            try { return JSON.parse(localStorage.getItem('login_attempts') || '{}'); }
            catch { return {}; }
        }

        function recordFailedAttempt() {
            const attempts = getLoginAttempts();
            const now = Date.now();
            if (!attempts.lockedUntil) attempts.lockedUntil = 0;
            if (!attempts.count) attempts.count = 0;

            if (attempts.lockedUntil > now) return true;

            attempts.count++;
            if (attempts.count >= MAX_LOGIN_ATTEMPTS) {
                attempts.lockedUntil = now + LOCKOUT_DURATION;
                attempts.count = 0;
            }
            localStorage.setItem('login_attempts', JSON.stringify(attempts));
            return attempts.lockedUntil > now;
        }

        function clearLoginAttempts() {
            localStorage.removeItem('login_attempts');
        }

        function getLockoutRemaining() {
            const attempts = getLoginAttempts();
            if (attempts.lockedUntil && attempts.lockedUntil > Date.now()) {
                return Math.ceil((attempts.lockedUntil - Date.now()) / 1000);
            }
            return 0;
        }

        // SHA-256 hash (Web Crypto API)
        async function hashPassword(password) {
            const data = HASH_SALT + password;
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Query Supabase admins table
        async function verifyLogin(email, passwordHash) {
            const resp = await fetch(
                `${SUPABASE_URL}/rest/v1/admins?email=eq.${encodeURIComponent(email)}&password_hash=eq.sha256$${HASH_SALT}$${passwordHash}&select=*`,
                {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                }
            );
            if (!resp.ok) throw new Error('Query failed');
            const data = await resp.json();
            return data.length > 0 ? data[0] : null;
        }

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            loginError.style.display = 'none';

            if (recordFailedAttempt()) {
                const remaining = getLockoutRemaining();
                showError('鐧诲綍灏濊瘯杩囧锛岃 ' + remaining + ' 绉掑悗閲嶈瘯銆?);
                return;
            }

            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('璇疯緭鍏ラ偖绠卞拰瀵嗙爜銆?);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Verifying...';

            try {
                const passwordHash = await hashPassword(password);
                const admin = await verifyLogin(email, passwordHash);

                if (admin) {
                    clearLoginAttempts();
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminEmail', admin.email);
                    sessionStorage.setItem('adminRole', admin.role);
                    sessionStorage.setItem('adminName', admin.name);
                    window.location.href = 'admin.html';
                } else {
                    showError('璐﹀彿鎴栧瘑鐮侀敊璇€?);
                }
            } catch (err) {
                console.error('[Login]', err);
                showError('鐧诲綍鏈嶅姟鏆傛椂涓嶅彲鐢紝璇风◢鍚庨噸璇曘€?);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login / 鐧诲綍';
            }
        });

        function showError(msg) {
            loginError.textContent = msg;
            loginError.style.display = 'block';
        }

        emailInput.addEventListener('input', function() { loginError.style.display = 'none'; });
        passwordInput.addEventListener('input', function() { loginError.style.display = 'none'; });
    </script>
</body>
</html>
