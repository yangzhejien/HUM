<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | HUM Journal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F8F9FA;
            padding: 2rem;
        }
        .login-box {
            background: white;
            padding: 3rem;
            border: 1px solid #E5E5E5;
            max-width: 400px;
            width: 100%;
        }
        .login-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #0A2342;
        }
        .login-subtitle {
            color: #4A5568;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #111;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #E5E5E5;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: #0A2342;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-primary {
            background: #0A2342;
            color: white;
        }
        .btn-primary:hover {
            background: #1E3A5F;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-msg {
            color: #DC2626;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            padding: 0.75rem;
            background: #FEE2E2;
            border: 1px solid #FECACA;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #4A5568;
            text-decoration: none;
        }
        .back-link:hover {
            color: #0A2342;
        }
        .admin-info {
            font-size: 0.75rem;
            color: #6B7280;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #E5E5E5;
        }
        .admin-info strong {
            color: #0A2342;
        }
    </style>
</head>
<body>
    <div class="login-container" id="admin-login">
        <div class="login-box">
            <h1 class="login-title">HUM Journal</h1>
            <p class="login-subtitle">Admin Login / 管理员登录</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Username / 用户名</label>
                    <input type="text" id="email" class="form-input" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password / 密码</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <div class="error-msg" id="loginError"></div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Login / 登录</button>
            </form>

            <a href="index.html" class="back-link">← Back to Home / 返回首页</a>

            <div class="admin-info">
                <strong>Admin Accounts:</strong><br>
                主编: Orion<br>
                编辑: Lyra
            </div>
        </div>
    </div>

    <script>
        // Security Configuration
        const MAX_LOGIN_ATTEMPTS = 5;
        const LOCKOUT_DURATION = 15 * 60 * 1000; // 15 minutes in milliseconds
        const REQUEST_LIMIT = 10; // Max requests per second
        const REQUEST_WINDOW = 1000; // 1 second window

        // Admin accounts configuration - supports multiple passwords per account
        const ADMIN_ACCOUNTS = {
            'yangll_0502@qq.com': {
                passwords: ['HUM@Orion_2026!', 'K3p#xZ9$qL7', 'V8s&2mP#wR5'],
                role: 'admin',
                name: '主编/审核',
                displayName: 'Orion'
            },
            'dmh12345676@qq.com': {
                passwords: ['HUM@Lyra_2026!', 'T4g#7sN$pM2', 'X6d&9fB#vC1'],
                role: 'editor',
                name: '编辑/排版',
                displayName: 'Lyra'
            }
        };

        // Helper function to get client IP (simulated - in production would need backend)
        function getClientIP() {
            return 'client_' + Math.random().toString(36).substring(7);
        }

        // Login attempt tracking
        function getLoginAttempts() {
            const attempts = localStorage.getItem('login_attempts');
            return attempts ? JSON.parse(attempts) : {};
        }

        function recordFailedAttempt(ip) {
            const attempts = getLoginAttempts();
            const now = Date.now();

            if (!attempts[ip]) {
                attempts[ip] = { count: 0, lockedUntil: 0 };
            }

            // Check if still locked
            if (attempts[ip].lockedUntil > now) {
                return true;
            }

            attempts[ip].count++;

            // Lock after MAX_LOGIN_ATTEMPTS failures
            if (attempts[ip].count >= MAX_LOGIN_ATTEMPTS) {
                attempts[ip].lockedUntil = now + LOCKOUT_DURATION;
                attempts[ip].count = 0;
            }

            localStorage.setItem('login_attempts', JSON.stringify(attempts));
            return attempts[ip].lockedUntil > now;
        }

        function clearLoginAttempts(ip) {
            const attempts = getLoginAttempts();
            if (attempts[ip]) {
                delete attempts[ip];
                localStorage.setItem('login_attempts', JSON.stringify(attempts));
            }
        }

        function getLockoutTimeRemaining(ip) {
            const attempts = getLoginAttempts();
            if (attempts[ip] && attempts[ip].lockedUntil > Date.now()) {
                return Math.ceil((attempts[ip].lockedUntil - Date.now()) / 1000);
            }
            return 0;
        }

        // Request rate limiting
        function getRequestCounts() {
            const counts = localStorage.getItem('request_counts');
            return counts ? JSON.parse(counts) : {};
        }

        function checkRateLimit(ip) {
            const counts = getRequestCounts();
            const now = Date.now();

            // Clean old entries
            if (!counts[ip]) {
                counts[ip] = { count: 0, windowStart: now };
            }

            // Reset if window has passed
            if (now - counts[ip].windowStart > REQUEST_WINDOW) {
                counts[ip] = { count: 0, windowStart: now };
            }

            counts[ip].count++;
            localStorage.setItem('request_counts', JSON.stringify(counts));

            return counts[ip].count <= REQUEST_LIMIT;
        }

        // Operation logging
        function logOperation(action, details) {
            const logs = JSON.parse(localStorage.getItem('operation_logs') || '[]');
            const logEntry = {
                timestamp: new Date().toISOString(),
                action: action,
                adminEmail: sessionStorage.getItem('adminEmail') || 'unknown',
                adminName: sessionStorage.getItem('adminName') || 'unknown',
                details: details,
                ip: getClientIP()
            };
            logs.unshift(logEntry);
            // Keep only last 1000 entries
            if (logs.length > 1000) logs.pop();
            localStorage.setItem('operation_logs', JSON.stringify(logs));
        }

        // Login logging
        function logLoginAttempt(email, success) {
            const logs = JSON.parse(localStorage.getItem('login_logs') || '[]');
            const logEntry = {
                timestamp: new Date().toISOString(),
                email: email,
                success: success,
                ip: getClientIP()
            };
            logs.unshift(logEntry);
            // Keep only last 1000 entries
            if (logs.length > 1000) logs.pop();
            localStorage.setItem('login_logs', JSON.stringify(logs));
        }

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');
        const submitBtn = document.getElementById('submitBtn');
        const clientIP = getClientIP();

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // Check rate limit
            if (!checkRateLimit(clientIP)) {
                showError('请求过于频繁，请稍后再试。');
                return;
            }

            // Check if locked out
            if (recordFailedAttempt(clientIP)) {
                const remaining = getLockoutTimeRemaining(clientIP);
                showError(`登录尝试过多，请 ${remaining} 秒后重试。`);
                return;
            }

            const email = emailInput.value.toLowerCase().trim();
            const password = passwordInput.value;

            // Sanitize input to prevent XSS
            const sanitizedEmail = email.replace(/[<>\"\'%;()&+]/g, '');

            // Check if email is allowed
            if (!ADMIN_ACCOUNTS[sanitizedEmail]) {
                logLoginAttempt(sanitizedEmail, false);
                showError('账号或密码错误。');
                return;
            }

            // Verify password (check if password is in the allowed list)
            if (!ADMIN_ACCOUNTS[sanitizedEmail].passwords.includes(password)) {
                logLoginAttempt(sanitizedEmail, false);
                showError('账号或密码错误。');
                return;
            }

            // Login success - clear failed attempts and store session
            clearLoginAttempts(clientIP);
            logLoginAttempt(sanitizedEmail, true);

            sessionStorage.setItem('adminLoggedIn', 'true');
            sessionStorage.setItem('adminEmail', sanitizedEmail);
            sessionStorage.setItem('adminRole', ADMIN_ACCOUNTS[sanitizedEmail].role);
            sessionStorage.setItem('adminName', ADMIN_ACCOUNTS[sanitizedEmail].name);

            window.location.href = 'admin.html';
        });

        function showError(msg) {
            loginError.textContent = msg;
            loginError.style.display = 'block';
        }

        // Clear error when typing
        emailInput.addEventListener('input', function() {
            loginError.style.display = 'none';
        });

        passwordInput.addEventListener('input', function() {
            loginError.style.display = 'none';
        });

        // Expose logOperation for admin page to use

</body>
</html>
