<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Viewer | HUM Journal</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: #F5F5F5; }
.viewer-container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
.article-header { background: white; padding: 2rem; margin-bottom: 1rem; border: 1px solid var(--color-border); }
.article-category { display: inline-block; padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 500; margin-bottom: 1rem; }
.article-category.public { background: #DBEAFE; color: #1E40AF; }
.article-category.academic { background: #E0E7FF; color: #3730A3; }
.article-title { font-size: 2rem; margin-bottom: 0.5rem; line-height: 1.3; }
.article-meta { color: var(--color-text-secondary); margin-bottom: 1rem; }
.pre-publication-notice { background: #FEF3C7; border: 1px solid #F59E0B; padding: 1rem; margin-bottom: 1rem; font-size: 0.875rem; }
.pre-publication-notice strong { color: #92400E; }
.viewer-frame { background: white; border: 1px solid var(--color-border); min-height: 600px; position: relative; }
.viewer-toolbar { background: #FAFAFA; border-bottom: 1px solid var(--color-border); padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
.zoom-controls, .page-controls { display: flex; align-items: center; gap: 0.5rem; }
.zoom-btn, .page-btn, .fullscreen-btn { border: 1px solid var(--color-border); background: white; cursor: pointer; font-size: 0.875rem; padding: 0.5rem 1rem; }
.zoom-btn { padding: 0.5rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.zoom-btn:hover, .page-btn:hover, .fullscreen-btn:hover { background: #E5E5E5; }
.zoom-level { min-width: 50px; text-align: center; font-size: 0.875rem; }
.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.page-indicator { font-size: 0.875rem; }
.document-container { padding: 2rem; background: white; min-height: 500px; overflow: auto; }
.document-content { max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1rem; }
.article-footer { background: white; padding: 1rem 2rem; margin-top: 1rem; border: 1px solid var(--color-border); text-align: center; }
.disclaimer { font-size: 0.875rem; color: var(--color-text-secondary); }
.back-link { display: inline-block; margin-top: 1rem; color: var(--color-primary); }
.loading, .error-message { text-align: center; padding: 3rem; }
.error-message { color: #DC2626; }
.fullscreen-mode { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: white; overflow: auto; }
.fullscreen-mode .viewer-container { max-width: 100%; margin: 0; padding: 1rem; }
.fullscreen-mode .viewer-toolbar { position: sticky; top: 0; z-index: 10; }
.fullscreen-mode .document-container { max-height: calc(100vh - 150px); overflow: auto; }
.pdf-download-btn { display: inline-block; padding: 0.5rem 1rem; background: #3B82F6; color: white; text-decoration: none; font-size: 0.875rem; border-radius: 4px; margin-top: 1rem; }
.pdf-download-btn:hover { background: #2563EB; }
@media (max-width: 768px) { .viewer-toolbar { flex-direction: column; } }
</style>
</head>
<body>
<div class="viewer-container" id="viewerContainer">
<div id="articleContent"><div class="loading">Loading article...</div></div>
</div>

<script>
(function() {
'use strict';

const SUPABASE_URL = 'https://gslggufgrtmdeyyyveay.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzbGdndWZncnRtZGV5eXl2ZWF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODQ0NzIsImV4cCI6MjA5Mjc2MDQ3Mn0.N4bpqRGmez2hxfyRDoW6YAaWeQGGJkhMd1v3N7NTKWs';

// Get article ID from URL
const urlParams = new URLSearchParams(window.location.search);
const articleId = urlParams.get('id');

if (!articleId) {
  document.getElementById('articleContent').innerHTML =
    '<div class="error-message">Article ID not found in URL.<br><a href="javascript:history.back()">Go Back</a></div>';
  return;
}

let article = null;
let currentZoom = 100;

async function fetchArticle() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/articles?id=eq.${articleId}&select=*`,
      {
        headers: {
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'apikey': SUPABASE_ANON_KEY
        }
      }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || data.length === 0) throw new Error('Article not found');
    article = data[0];
    renderArticle();
  } catch (err) {
    console.error('Error loading article:', err);
    document.getElementById('articleContent').innerHTML =
      '<div class="error-message">Failed to load article.<br><a href="javascript:history.back()">Go Back</a></div>';
  }
}

function renderArticle() {
  if (!article) return;

  const isPublic = article.category === 'public';
  const backUrl = isPublic ? 'public.html' : 'academic.html';
  const date = formatDate(article.created_at);

  const pdfBtn = article.pdf_data
    ? `<button class="pdf-download-btn" onclick="downloadPdf()">Download PDF</button>`
    : article.file_url
    ? `<a href="${article.file_url}" class="pdf-download-btn" target="_blank" download>Download PDF</a>`
    : '';

  document.getElementById('articleContent').innerHTML = `
<div class="article-header">
  <span class="article-category ${isPublic ? 'public' : 'academic'}">${isPublic ? 'HUM-Public' : 'HUM-Academic'}</span>
  <h1 class="article-title">${escapeHtml(article.title)}</h1>
  <p class="article-meta">${escapeHtml(article.author || 'Anonymous')} | ${date}</p>
  ${article.abstract ? `<p style="color:var(--color-text-secondary);line-height:1.6;">${escapeHtml(article.abstract)}</p>` : ''}
  ${pdfBtn}
</div>

<div class="viewer-frame">
  <div class="viewer-toolbar">
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">&#8722;</button>
      <span class="zoom-level" id="zoomLevel">${currentZoom}%</span>
      <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
      <button class="zoom-btn" onclick="resetZoom()" title="Reset" style="font-size:0.75rem;">100%</button>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>
  </div>
  <div class="document-container">
    <div class="document-content" id="documentContent" style="transform:scale(${currentZoom/100});transform-origin:top center;">
      ${article.content ? article.content.replace(/\n/g, '<br>') : '<p style="text-align:center;color:var(--color-text-secondary);">Loading content...</p>'}
    </div>
  </div>
</div>

<div class="article-footer">
  <p class="disclaimer">Pre-Publication Version | For Academic Reference Only</p>
  <a href="${backUrl}" class="back-link">&larr; Back to List</a>
</div>`;
}

function downloadPdf() {
  if (!article || !article.pdf_data) return;
  const link = document.createElement('a');
  link.href = article.pdf_data;
  link.download = (article.title || 'article') + '.pdf';
  link.click();
}

function zoomIn() {
  if (currentZoom < 200) { currentZoom += 10; updateZoom(); }
}
function zoomOut() {
  if (currentZoom > 50) { currentZoom -= 10; updateZoom(); }
}
function resetZoom() {
  currentZoom = 100; updateZoom();
}
function updateZoom() {
  document.getElementById('zoomLevel').textContent = currentZoom + '%';
  document.getElementById('documentContent').style.transform = `scale(${currentZoom/100})`;
}
function toggleFullscreen() {
  const container = document.getElementById('viewerContainer');
  container.classList.toggle('fullscreen-mode');
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.addEventListener('keydown', function(e) {
  if (e.key === '+' || e.key === '=') zoomIn();
  else if (e.key === '-') zoomOut();
  else if (e.key === '0') resetZoom();
  else if (e.key === 'Escape') toggleFullscreen();
});

fetchArticle();
})();
</script>
</body>
</html>
